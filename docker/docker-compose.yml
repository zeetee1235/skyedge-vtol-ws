# =============================================
# VTOL 프로젝트 Docker Compose
#
# 권장 실행 방법:
#   ./sim.sh          # headless
#   ./sim.sh --gui    # Gazebo GUI 포함
#   ./sim.sh --down   # 종료
# =============================================

services:

  # ── PX4 SITL + Gazebo Sim (headless) ──────────────────────────────
  # standard_vtol 기체 모델, PX4 uXRCE-DDS → xrce_agent(UDP 8888) 연결
  px4_sitl:
    image: jonasvautherin/px4-gazebo-headless:latest
    profiles: [sim]
    network_mode: host
    command: ["-v", "gz_standard_vtol"]
    environment:
      - PX4_HOME_LAT=37.5230
      - PX4_HOME_LON=126.9830
      - PX4_HOME_ALT=58.0
      - PX4_UXRCE_DDS_NS=drone1
    restart: unless-stopped

  # ── Micro XRCE-DDS Agent (PX4 ↔ ROS2 브리지) ─────────────────────
  xrce_agent:
    build:
      context: ..
      dockerfile: docker/xrce_agent.Dockerfile
    profiles: [sim]
    network_mode: host
    command: ["/bin/bash", "-c", "source /opt/ros/humble/setup.bash && MicroXRCEAgent udp4 -p 8888"]
    depends_on:
      - px4_sitl
    restart: unless-stopped

  # ── ROS2 노드 (시뮬레이션) ────────────────────────────────────────
  vtol_sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: [sim]
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY:-}
    volumes:
      - ../src:/vtol_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               for pkg in vtol_control_nav vtol_control_task vtol_comm_lte vtol_vision_aruco vtol_vision_yolo; do
                 for f in /vtol_ws/src/$$pkg/src/*_node.py; do
                   [ -f \"$$f\" ] || continue;
                   dst=/vtol_ws/install/$$pkg/lib/$$pkg/$$(basename $$f .py);
                   [ -f \"$$dst\" ] && cp \"$$f\" \"$$dst\" && chmod +x \"$$dst\";
                 done;
               done &&
               source /vtol_ws/install/setup.bash &&
               ros2 launch vtol_bringup sim_launch.py"
    depends_on:
      - xrce_agent

  # ── Gazebo GUI ────────────────────────────────────────────────────
  # ./sim.sh --gui 로 실행 시 자동으로 px4_sitl 서버에 붙음
  # 소프트웨어 렌더링(LIBGL_ALWAYS_SOFTWARE) 사용 — GPU 드라이버 불필요
  gzclient:
    image: jonasvautherin/px4-gazebo-headless:latest
    profiles: [sim]
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=3.3
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    entrypoint: ["gz", "sim", "-g"]
    depends_on:
      - px4_sitl

  # ── ROS2 노드 (실기체) ────────────────────────────────────────────
  vtol_real:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: [real]
    network_mode: host
    privileged: true
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyACM0:/dev/ttyACM0
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ../src:/vtol_ws/src
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               source /vtol_ws/install/setup.bash &&
               ros2 launch vtol_bringup real_launch.py"

  # ── Foxglove 브릿지 ───────────────────────────────────────────────
  foxglove_bridge:
    image: ros:humble
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      bash -c "apt-get update -q &&
               apt-get install -y ros-humble-foxglove-bridge &&
               source /opt/ros/humble/setup.bash &&
               ros2 run foxglove_bridge foxglove_bridge
               --ros-args -p port:=8765"
    ports:
      - "8765:8765"
