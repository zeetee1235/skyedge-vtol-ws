# =============================================
# VTOL 전 패키지 공통 파라미터
# 수정 권한: 총괄만
# =============================================

/**:
  ros__parameters:
    vtol:
      drone_id: "drone1"
      use_sim: true                    # true=시뮬, false=실기체

      # 비행 파라미터
      takeoff_altitude: 10.0           # 이륙 고도 (m)
      cruise_altitude: 40.0            # 순항 고도 (m)
      max_altitude_m: 40.0             # 최대 고도 제한 (m)
      takeoff_timeout_sec: 35.0        # TAKEOFF 단계 강제 전환 타임아웃
      landing_descent_altitude: 3.0   # 정밀 착륙 시작 고도 (m)
      max_velocity: 15.0               # 최대 속도 (m/s)

      # waypoint 입력 프레임: gps | local_ned
      # local_ned: [north(m), east(m), alt(m)]
      waypoint_frame: "local_ned"
      waypoints:
        - "0.0,0.0,40.0"
        - "300.0,0.0,40.0"
        - "600.0,150.0,40.0"
        - "900.0,150.0,40.0"
        - "1200.0,0.0,40.0"

      # 동적 waypoint 리로드 (ROS 파라미터 값 재반영)
      dynamic_waypoint_update: true
      dynamic_reload_period_sec: 1.0

      # waypoint 도달/전환/장애 판정 파라미터
      waypoint_reached_threshold: 2.0
      transition_timeout_sec: 8.0
      waypoint_unreachable_timeout_sec: 45.0
      comm_loss_timeout_sec: 15.0
      gps_error_failsafe: true

      # Trajectory planner 선택
      # 신규: trajectory.type, 하위호환: trajectory_mode
      trajectory:
        type: "smoothstep"             # point_jump | linear | smoothstep | mpc
      trajectory_mode: "smoothstep"
      trajectory_max_step_m: 2.0

      # MPC planner stub 파라미터 (trajectory.type=mpc 시 사용)
      mpc:
        horizon_steps: 15
        dt: 0.1
        w_pos: 1.0
        w_vel: 0.2
        w_u: 0.05

      # LANDING_CONFIRM 판정 파라미터
      landing_confirm_alt_threshold: 0.4
      landing_confirm_speed_threshold: 0.5
      landing_confirm_hold_sec: 1.0
      landing_confirm_use_kinematic_fallback: false

      # 비전
      aruco_marker_id: 0               # 착륙 지점 ArUco 마커 ID
      yolo_confidence_threshold: 0.7

      # HW
      gripper_open_angle: 90
      gripper_close_angle: 0

      # 통신
      lte_gcs_ip: "192.168.1.100"
      lte_gcs_port: 14550

      # Foxglove
      foxglove_port: 8765
